<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hylics Plugins</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 1s ease;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 10px;
      color: #9b59ff;
      text-shadow: 0 0 15px #9b59ff;
    }

    p {
      font-size: 1.2rem;
      color: #ccc;
    }

    .btn {
      margin-top: 25px;
      display: inline-block;
      padding: 12px 25px;
      background: #9b59ff;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
      box-shadow: 0 0 10px #9b59ff;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #b47dff;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Hylics Plugins</h1>
    <p>Site officiel du projet GitHub.</p>

    <a class="btn" href="https://github.com/True-Zakota/Hylics-plugins">
      Voir le GitHub
    </a>
  </div>
</body>
</html>
